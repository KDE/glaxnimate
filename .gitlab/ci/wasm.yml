
wasm:
    image: mattbas/qt-emscripten:6.10.2
    stage: build
    script:
        - mkdir build
        - cd build
        - source /opt/emsdk/emsdk_env.sh
        - cmake -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE -DQT_HOST_PATH=$QT_HOST_PATH -DCMAKE_CXX_FLAGS="-matomics -mbulk-memory" -DCMAKE_EXE_LINKER_FLAGS="-lembind" -DCMAKE_BUILD_TYPE=Release ../src/wasm/
        - make
    when: always
    artifacts:
        paths:
            - build/glaxnimate.js
            - build/glaxnimate.wasm



