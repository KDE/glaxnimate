<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaxnimate Wasm</title>
</head>
<body>
    <script src="glaxnimate.js"></script>
    <canvas id="canvas"></canvas>
    <script>
    const canvas = document.getElementById("canvas");
    let player;
    fetch("example.rawr")
    .then(r => r.text())
    .then(data => {
        player = new Glaxnimate.Player({
            data,
            slug: "glaxnimate",
            canvas
        });
    });
    </script>
</body>
</html>
